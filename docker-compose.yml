services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

  mcp-server:
    build:
      context: .
      target: mcp-server
    restart: always
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/mcp-server.db
      - REDIS_URL=redis://redis:6379
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
    volumes:
      - mcp-server-data:/data

  platform:
    build:
      context: .
      target: platform
    restart: always
    depends_on:
      - redis
      - mcp-server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/platform.db
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
    volumes:
      - platform-data:/data
    ports:
      - "80:3001"

volumes:
  redis-data:
  mcp-server-data:
  platform-data:
