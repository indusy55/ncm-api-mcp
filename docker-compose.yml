services:
  redis:
    image: redis:7-alpine
    container_name: ncm-redis
    restart: always
    volumes:
      - redis-data:/data

  mcp-server:
    build:
      context: .
      target: mcp-server
    container_name: ncm-mcp-server
    restart: always
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/platform.db
      - REDIS_URL=redis://redis:6379
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
    volumes:
      - platform-data:/data

  platform:
    build:
      context: .
      target: platform
    container_name: ncm-platform
    restart: always
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/platform.db
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
    volumes:
      - platform-data:/data

  nginx:
    image: nginx:alpine
    container_name: ncm-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - platform
      - mcp-server
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis-data:
  platform-data:
